<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto | Club Atlético Plaza Huincul</title>
  <link rel="stylesheet" href="./css/estilosHeader.css">
  <link rel="stylesheet" href="./css/estilosContacto.css">
  <link rel="stylesheet" href="./css/estilosInsta.css">
  <link rel="stylesheet" href="./css/estiloFooter.css">
  <script src="./js/funcionalidad.js"></script>
  <script src="./js/contacto.js"></script>
</head>
<body onload="anioActual()">
    <div id="header"></div>
    <script>
        fetch('encabezado.html').then(response => response.text())
        .then(data => {document.getElementById('header').innerHTML = data;
        });
    </script>
    <header class="banner">
        <h1>Contacto</h1>
    </header>

    <main class="contacto">
        <section class="info">
        <h2>📍 Dirección</h2>
        <p>Atahualpa Yupanqui 472 Barrio Central, Plaza Huincul, Neuquén</p>

        <h2>📞 Teléfono</h2>
        <p>0299-6200436</p>

        <h2>📧 Email</h2>
        <p>cplazahuincul@gmail.com</p>
        </section>

        <section class="formulario">
        <h2>Formulario de Contacto</h2>
        <form id="formContacto">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" required>

            <label for="email">Correo:</label>
            <input type="email" id="email" required>

            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" rows="5" required></textarea>

            <button type="submit">Enviar</button>
            <p id="respuesta"></p>
        </form>
        </section>
    </main>

    <footer>
        <div>
            <a href="#" class="escudo">
                <img src="./Imagenes/escudoCAPH.jpg" alt="Escudo CAPH"/>
            </a>
            <p>&copy; Club Atlético Plaza Huincul 1920-<span id="anioActual"></span><br/>
                Sitio Web Oficial. <br/>
                Todos los derechos reservados.</p>
        </div>
    </footer>
</body>
</html>
